name: Auction System CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: auctionsystem
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize Database Schema
      run: |
        sudo apt-get update && sudo apt-get install -y postgresql-client
        PGPASSWORD=admin psql -h localhost -U postgres -d auctionsystem -f auctionsystem/src/main/resources/db/init.sql

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: |
        cd auctionsystem
        # ĐÃ SỬA: Thay -DskipDocker=true bằng -DdockerCompose.skip=true
        mvn clean compile -DdockerCompose.skip=true
        mvn test -DdockerCompose.skip=true
      env:
        DB_URL: jdbc:postgresql://localhost:5432/auctionsystem
        DB_USER: postgres
        DB_PASSWORD: admin

    # --- Đã gộp bước đóng gói và lưu file vào đây ---
    - name: Package Application
      run: |
        cd auctionsystem
        mvn package -DskipTests -DdockerCompose.skip=true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Auction-System-Executable
        path: auctionsystem/target/*.jar